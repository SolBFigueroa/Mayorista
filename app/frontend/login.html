<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <!-- fondo exterior -->
    <div class="flex justify-center items-center h-screen bg-gray-100">

        <!-- tarjeta del login -->
        <div class="flex w-4/5 h-4/5 rounded-xl shadow-lg">

            <!-- izquierda: formulario -->
            <div class="w-1/2 bg-white px-40 rounded-l-xl">
                <!-- columna a la mitad-blanco- espacio interno -bordes redondeados-->
                <h1 class="text-3xl font-bold text-gray-800 pt-40">Bienvenido!</h1>
                <p class="text-base text-gray-400 mt-1 pt-1">Por favor ingrese sus datos debajo</p>
                <form class="flex flex-col gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-sm text-gray-600 pt-2">Email</label>
                        <div id="error-msg"
                            class="hidden text-red-500 text-sm bg-red-50 border border-red-200 rounded-lg px-4 py-2">
                        </div>
                        <input id="email" type="email" placeholder="Ingresa tu email"
                            class="border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:border-cyan-950 bg-slate-100">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-sm text-gray-600">Contraseña</label>
                        <input id="password" type="password" placeholder="Ingresa tu contraseña"
                            class="border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:border-cyan-950 bg-slate-100">
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="remember">
                            <label for="remember" class="text-sm text-gray-500">Recordarme</label>
                        </div>
                        <a href="#" class="text-sm text-teal-800">¿Olvidaste tu contraseña?</a>
                    </div>
                    <button type="button" id="boton-ingresar"
                        class="flex justify-center w-full py-2 text-sm font-semibold text-white bg-cyan-950 rounded-lg shadow hover:bg-cyan-800">
                        Ingresar
                    </button>

                </form>
            </div>

            <!-- derecha: panel decorativo -->
            <div class="w-1/2 bg-cyan-950 rounded-r-xl">


            </div>

        </div>
    </div>
    <!-- JS va acá, justo antes de cerrar body -->
    <script src="login.js"></script>

</body>

</html>
